<!DOCTYPE html>
<html>
<head>
<style>
.box{
    border: 2px, solid, blue;
    text-align: center;
    padding: 30px;
    margin: 40px;
    height: 20px;
    box-sizing: border-box;
}
#overflow{
    display: flex;
    flex-direction: column;
    gap:0px;
    width: 300px;
    height: 200px;
    border: 2px,solid,red;
    position:relative;

overflow: auto;

}

#one{
    width: 200px;
    height: 100px;
    padding: 20px;
    border: 5px solid;
    box-sizing: border-box;
    margin-bottom: 2px;

}
#two{
    width: 200px;
    height: 100px;
    padding: 20px;
    border: 5px solid;
    box-sizing: content-box;
    margin-top: 5px;


}
.outline{
    width:200px;
    padding:20px;
    border:2px solid black;

    outline:4px solid red;
}

.box1{
    width:150px;
    height:150px;
    background:red;
    position:absolute;
    top:50px;
    left:50px;
    z-index:1;
}

.box2{
    width:150px;
    height:150px;
    background:blue;
    position:absolute;
    top:100px;
    left:100px;
    z-index:2;
}
</style>
</head>

<body>

<div class="box">
    Web Page
</div>
<div id="overflow">
    <p>HTML</p>
    <p>CSS</p>
    <p>JavaScript</p>
    <p>React</p>
    <p>Git</p>
</div>

<div id="one">Box1</div>
<div id="two">Box2</div>

<div class="outline">
    Hello
</div>
<div class="box1">Box 1</div>
<div class="box2">Box 2</div>


</body>
</html>
